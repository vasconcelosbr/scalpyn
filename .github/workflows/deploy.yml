name: Deploy

# Backend deploys to Cloud Run are owned by the Google Cloud Build trigger
# `rmgpgab-scalpyn-us-central1-vasconcelosbr-scalpyn--majye` (project
# `clickrate-477217`) — see `cloudbuild.yaml` at the repo root.
#
# This workflow USED TO build & deploy the backend in two flavors (Workload
# Identity Federation + Service Account Key fallback). Both jobs were guarded
# by `if:` clauses on GCP secrets that aren't configured in this repository,
# so every push produced a phantom failure check. We removed them; the only
# job left here is the frontend build validation.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend validation'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ── Frontend: validate build (Vercel deploys automatically) ─
  validate-frontend:
    name: Validate Frontend Build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_frontend == 'false' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: npm run build
