name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_frontend:
        description: 'Skip frontend validation'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ── Backend: build, push and deploy to Cloud Run ──────────
  deploy-backend:
    name: Deploy Backend (Cloud Run)
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            -t ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:latest \
            backend

      - name: Push Docker image
        run: |
          docker push --all-tags \
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8000

  # ── Backend (SA Key fallback): uses GCP_SA_KEY secret ─────
  deploy-backend-sa:
    name: Deploy Backend via SA Key (Cloud Run)
    runs-on: ubuntu-latest
    if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalpyn:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalpyn:latest \
            backend

      - name: Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalpyn:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalpyn:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy scalpyn \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/scalpyn:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --min-instances 1 \
            --no-cpu-throttling \
            --cpu-boost \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:us-central1:scalpyn

  # ── Frontend: validate build (Vercel deploys automatically) ─
  validate-frontend:
    name: Validate Frontend Build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_frontend == 'false' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: npm run build
