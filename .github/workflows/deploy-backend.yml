name: Deploy Backend to Cloud Run (deprecated)

# Backend deploys are owned by the Google Cloud Build trigger
# `rmgpgab-scalpyn-us-central1-vasconcelosbr-scalpyn--majye` (project
# `clickrate-477217`) — see `cloudbuild.yaml` at the repo root for the
# authoritative build + deploy pipeline.
#
# This workflow used to run on every push to main with `if: secrets.GCP_SA_KEY
# != ''`, which evaluates to false in this repository (no GCP secrets are
# configured). GitHub still records the run as a failure when no jobs run,
# polluting the Checks panel with a phantom red X on every commit and masking
# the real Cloud Build status. It also drifted from `cloudbuild.yaml` (wrong
# port, missing `--timeout-startup`/`--cpu-boost`/`--no-cpu-throttling` flags).
#
# We keep the file as a `workflow_dispatch`-only no-op so the manual entry in
# the Actions UI is preserved, but it no longer fires on push.

on:
  workflow_dispatch:

jobs:
  noop:
    name: Backend deploy is handled by Cloud Build
    runs-on: ubuntu-latest
    steps:
      - name: Print pointer to the real deploy
        run: |
          echo "Backend deploys to Cloud Run are driven by cloudbuild.yaml"
          echo "GCP project: clickrate-477217"
          echo "Trigger: rmgpgab-scalpyn-us-central1-vasconcelosbr-scalpyn--majye"
